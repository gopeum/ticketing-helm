apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: event-svc
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/gopeum/ticketing-helm
    targetRevision: main
    path: helm-charts/event-svc

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ticketing

  syncPolicy:
    automated:
      prune: true
      selfHeal: true